{% extends "layout.html" %}
{% block content %}
<h2>Lägg till körpass</h2>
<form method="post">
  <label>Fordon:</label>
  <select name="vehicle_id" required>
    {% for v in vehicles %}
      <option value="{{ v.vehicleID }}">{{ v.registreringsnummer }}</option>
    {% endfor %}
  </select><br><br>

  <label>StartTid (YYYY-MM-DD HH:MM:SS):</label><br>
  <input name="startTid" value="2026-02-01 06:00:00" required><br><br>

  <label>SlutTid (YYYY-MM-DD HH:MM:SS):</label><br>
  <input name="slutTid" value="2026-02-01 16:30:00" required><br><br>

  <label>Sträcka (km):</label><br>
  <input name="stracka" type="number" value="600" required><br><br>

  <label>Status:</label>
  <select name="status">
    <option value="avslutad" selected>avslutad</option>
    <option value="pauserad">pauserad</option>
    <option value="aktiv">aktiv</option>
  </select><br><br>

  <button type="submit">Spara</button>
</form>
{% endblock %}
